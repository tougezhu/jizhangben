<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- PWA 元信息：iPhone 全屏支持 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="记账本">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>记账本</title>
    <style>
        /* 全局重置 & 字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f5f7fc;
            min-height: 100vh;
            padding: 0 0 80px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* 主容器 – 手机优先宽度 */
        .app {
            width: 100%;
            max-width: 480px;
            background: #f5f7fc;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.03);
        }
        /* 蓝紫渐变顶栏 */
        .header {
            background: linear-gradient(135deg, #5b6aff, #8b6cff);
            color: white;
            padding: 24px 20px 20px 20px;
            border-radius: 0 0 28px 28px;
            box-shadow: 0 6px 18px rgba(91, 106, 255, 0.30);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header h1 small {
            font-size: 16px;
            font-weight: 400;
            opacity: 0.85;
            margin-left: auto;
        }
        /* 本月概览卡片 */
        .summary-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(2px);
            margin: -16px 16px 16px 16px;
            padding: 18px 16px;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            color: #1e293b;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .summary-item {
            flex: 1 0 45%;
            display: flex;
            flex-direction: column;
            margin: 4px 0;
        }
        .summary-item .label {
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            letter-spacing: 0.3px;
        }
        .summary-item .value {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
        }
        .summary-item .value.income { color: #0b9e6f; }
        .summary-item .value.expense { color: #e4575b; }
        .summary-item .value.balance { color: #3b3f5c; }
        .divider {
            width: 1px;
            background: #e2e8f0;
            height: 36px;
            align-self: center;
        }
        /* 卡片通用 */
        .card {
            background: white;
            border-radius: 24px;
            margin: 16px 16px 12px 16px;
            padding: 18px 16px 16px 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.02);
            border: 1px solid rgba(226, 232, 240, 0.6);
            transition: 0.2s;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            font-weight: 600;
            color: #1e293b;
            font-size: 17px;
        }
        .card-header .badge {
            background: #eef2ff;
            color: #5b6aff;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }
        /* 分类统计进度条 */
        .stat-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .stat-icon {
            width: 28px;
            font-size: 18px;
            margin-right: 8px;
            text-align: center;
        }
        .stat-name {
            width: 56px;
            font-weight: 500;
            color: #1e293b;
            flex-shrink: 0;
        }
        .stat-bar-bg {
            flex: 1;
            height: 8px;
            background: #e9edf4;
            border-radius: 20px;
            margin: 0 10px;
            overflow: hidden;
        }
        .stat-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #5b6aff, #8b6cff);
            border-radius: 20px;
            width: 0%;
            transition: width 0.2s;
        }
        .stat-amount {
            font-weight: 600;
            color: #0f172a;
            width: 60px;
            text-align: right;
            font-size: 14px;
        }
        /* 流水明细 */
        .date-group {
            margin-top: 12px;
        }
        .date-label {
            font-weight: 600;
            color: #475569;
            font-size: 13px;
            padding: 6px 0 4px 0;
            border-bottom: 1px dashed #e9edf4;
            margin-bottom: 6px;
        }
        .record-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }
        .record-item:last-child {
            border-bottom: none;
        }
        .record-icon {
            font-size: 20px;
            width: 36px;
            text-align: center;
        }
        .record-info {
            flex: 1;
            margin-left: 6px;
        }
        .record-cat {
            font-weight: 500;
            color: #0f172a;
        }
        .record-note {
            color: #64748b;
            font-size: 12px;
            margin-left: 6px;
        }
        .record-amount {
            font-weight: 700;
            margin-right: 10px;
        }
        .record-amount.income { color: #0b9e6f; }
        .record-amount.expense { color: #e4575b; }
        .record-del {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            transition: 0.15s;
        }
        .record-del:active { color: #e4575b; transform: scale(1.2); }
        /* 记一笔按钮 */
        .fab {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #5b6aff, #7a5cff);
            color: white;
            border: none;
            border-radius: 60px;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 10px 28px rgba(91, 106, 255, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 99;
            max-width: 200px;
            width: auto;
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .fab:active { transform: translateX(-50%) scale(0.95); }
        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: 0.25s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal {
            background: white;
            max-width: 400px;
            width: 100%;
            border-radius: 40px;
            padding: 28px 22px 22px 22px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.2);
            transform: translateY(20px);
            transition: 0.25s;
        }
        .modal-overlay.active .modal {
            transform: translateY(0);
        }
        .modal h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #0f172a;
        }
        .modal label {
            font-weight: 500;
            color: #334155;
            font-size: 14px;
            display: block;
            margin: 12px 0 4px 0;
        }
        .modal select, .modal input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 30px;
            font-size: 15px;
            background: #f8fafc;
            transition: 0.15s;
            outline: none;
        }
        .modal select:focus, .modal input:focus {
            border-color: #5b6aff;
            background: white;
        }
        .modal .type-toggle {
            display: flex;
            gap: 10px;
            margin: 8px 0 6px 0;
        }
        .modal .type-toggle button {
            flex: 1;
            padding: 10px 0;
            border: 2px solid #e2e8f0;
            border-radius: 40px;
            background: white;
            font-weight: 600;
            color: #475569;
            transition: 0.1s;
        }
        .modal .type-toggle button.active-income {
            border-color: #0b9e6f;
            background: #eafaf4;
            color: #0b9e6f;
        }
        .modal .type-toggle button.active-expense {
            border-color: #e4575b;
            background: #fde8e8;
            color: #e4575b;
        }
        .modal .actions {
            display: flex;
            gap: 12px;
            margin-top: 22px;
        }
        .modal .actions button {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            background: #eef2ff;
            color: #3b3f5c;
        }
        .modal .actions button.primary {
            background: linear-gradient(135deg, #5b6aff, #8b6cff);
            color: white;
            box-shadow: 0 4px 12px rgba(91, 106, 255, 0.3);
        }
        .modal .actions button.danger {
            background: #fee2e2;
            color: #b91c1c;
        }
        .empty-state {
            text-align: center;
            padding: 28px 0 12px 0;
            color: #94a3b8;
            font-size: 15px;
        }
        .clear-all {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 13px;
            text-decoration: underline;
            padding: 6px 12px;
            border-radius: 30px;
        }
        .clear-all:active { background: #f1f5f9; }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- 顶栏 -->
    <div class="header">
        <h1>📒 记账本 <small>本月</small></h1>
    </div>

    <!-- 本月概览 -->
    <div class="summary-card" id="summaryCard">
        <div class="summary-item"><span class="label">结余</span><span class="value balance" id="balanceVal">0.00</span></div>
        <div class="divider"></div>
        <div class="summary-item"><span class="label">收入</span><span class="value income" id="incomeVal">0.00</span></div>
        <div class="divider"></div>
        <div class="summary-item"><span class="label">支出</span><span class="value expense" id="expenseVal">0.00</span></div>
        <div class="divider"></div>
        <div class="summary-item"><span class="label">总笔数</span><span class="value" id="countVal" style="font-size:20px;">0</span></div>
    </div>

    <!-- 分类统计 -->
    <div class="card" id="statsCard">
        <div class="card-header"><span>📊 分类统计</span><span class="badge">占比</span></div>
        <div id="statsList"></div>
    </div>

    <!-- 流水明细 -->
    <div class="card" style="padding-bottom: 8px;">
        <div class="card-header">
            <span>📋 流水明细</span>
            <button class="clear-all" id="clearAllBtn">清空全部</button>
        </div>
        <div id="recordsContainer">
            <div class="empty-state">✨ 还没有记录，记一笔吧</div>
        </div>
    </div>

    <!-- 记一笔按钮 -->
    <button class="fab" id="addBtn">➕ 记一笔</button>

    <!-- 模态框 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>✏️ 记一笔</h2>
            <div class="type-toggle" id="typeToggle">
                <button class="active-expense" data-type="expense">支出</button>
                <button data-type="income">收入</button>
            </div>
            <label>分类</label>
            <select id="categorySelect"></select>
            <label>金额 (元)</label>
            <input type="number" id="amountInput" placeholder="0.00" step="0.01" min="0.01">
            <label>日期</label>
            <input type="date" id="dateInput">
            <label>备注 (可选)</label>
            <input type="text" id="noteInput" placeholder="备注">
            <div class="actions">
                <button id="cancelModalBtn">取消</button>
                <button class="primary" id="saveModalBtn">保存</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ----- 分类数据 -----
        const EXPENSE_CATS = [
            { icon: '🍚', name: '餐饮' }, { icon: '🚌', name: '交通' }, { icon: '🛒', name: '日用' },
            { icon: '👗', name: '服饰' }, { icon: '🏠', name: '住房' }, { icon: '📱', name: '通讯' },
            { icon: '🎮', name: '娱乐' }, { icon: '💊', name: '医疗' }, { icon: '📚', name: '教育' },
            { icon: '🎁', name: '人情' }, { icon: '💳', name: '金融' }, { icon: '📝', name: '其他' }
        ];
        const INCOME_CATS = [
            { icon: '💰', name: '工资' }, { icon: '💼', name: '兼职' }, { icon: '📈', name: '理财' },
            { icon: '🧧', name: '红包' }, { icon: '↩️', name: '退款' }, { icon: '➕', name: '其他' }
        ];

        // 当前选中的类型: 'expense' 或 'income'
        let currentType = 'expense';
        let editingId = null; // 编辑模式暂不实现，保留扩展

        // DOM 元素
        const summaryEl = {
            balance: document.getElementById('balanceVal'),
            income: document.getElementById('incomeVal'),
            expense: document.getElementById('expenseVal'),
            count: document.getElementById('countVal'),
        };
        const statsList = document.getElementById('statsList');
        const recordsContainer = document.getElementById('recordsContainer');
        const addBtn = document.getElementById('addBtn');
        const modalOverlay = document.getElementById('modalOverlay');
        const cancelModalBtn = document.getElementById('cancelModalBtn');
        const saveModalBtn = document.getElementById('saveModalBtn');
        const typeToggle = document.getElementById('typeToggle');
        const categorySelect = document.getElementById('categorySelect');
        const amountInput = document.getElementById('amountInput');
        const dateInput = document.getElementById('dateInput');
        const noteInput = document.getElementById('noteInput');
        const clearAllBtn = document.getElementById('clearAllBtn');

        // ----- 数据读写 -----
        function loadRecords() {
            try {
                const data = localStorage.getItem('accounting_records');
                return data ? JSON.parse(data) : [];
            } catch { return []; }
        }

        function saveRecords(records) {
            localStorage.setItem('accounting_records', JSON.stringify(records));
        }

        // 获取当前月份范围 (本月1日 ~ 下月1日)
        function getMonthRange() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const start = new Date(year, month, 1);
            const end = new Date(year, month + 1, 1);
            return { start, end };
        }

        // 过滤本月记录
        function getCurrentMonthRecords(records) {
            const { start, end } = getMonthRange();
            return records.filter(r => {
                const d = new Date(r.date);
                return d >= start && d < end;
            });
        }

        // ----- 渲染：概览 + 统计 + 明细 -----
        function renderAll() {
            const allRecords = loadRecords();
            const monthRecords = getCurrentMonthRecords(allRecords);

            // 计算汇总
            let totalIncome = 0, totalExpense = 0;
            monthRecords.forEach(r => {
                if (r.type === 'income') totalIncome += r.amount;
                else totalExpense += r.amount;
            });
            const balance = totalIncome - totalExpense;
            summaryEl.balance.textContent = balance.toFixed(2);
            summaryEl.income.textContent = totalIncome.toFixed(2);
            summaryEl.expense.textContent = totalExpense.toFixed(2);
            summaryEl.count.textContent = monthRecords.length;

            // 分类统计 (支出+收入分别统计)
            const statsMap = new Map();
            // 初始化所有分类
            const allCats = [...EXPENSE_CATS, ...INCOME_CATS];
            allCats.forEach(c => {
                const key = c.name;
                statsMap.set(key, { icon: c.icon, name: c.name, amount: 0, type: EXPENSE_CATS.includes(c) ? 'expense' : 'income' });
            });
            monthRecords.forEach(r => {
                const key = r.category;
                if (statsMap.has(key)) {
                    const entry = statsMap.get(key);
                    entry.amount += r.amount;
                } else {
                    // 万一有未知分类
                    statsMap.set(key, { icon: '📌', name: key, amount: r.amount, type: r.type });
                }
            });

            // 排序: 支出分类在前, 按金额降序
            const sorted = Array.from(statsMap.values()).sort((a, b) => {
                if (a.type === 'expense' && b.type === 'income') return -1;
                if (a.type === 'income' && b.type === 'expense') return 1;
                return b.amount - a.amount;
            });

            const maxAmount = Math.max(...sorted.map(s => s.amount), 1);
            statsList.innerHTML = sorted.map(s => {
                const pct = maxAmount > 0 ? (s.amount / maxAmount * 100) : 0;
                const isExpense = s.type === 'expense';
                const color = isExpense ? '#e4575b' : '#0b9e6f';
                return `<div class="stat-item">
                    <span class="stat-icon">${s.icon}</span>
                    <span class="stat-name">${s.name}</span>
                    <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${pct}%;background:${color};"></div></div>
                    <span class="stat-amount">${s.amount.toFixed(1)}</span>
                </div>`;
            }).join('');

            // 流水明细：按日期分组 (降序)
            const sortedRecords = [...monthRecords].sort((a, b) => new Date(b.date) - new Date(a.date));
            const groups = {};
            sortedRecords.forEach(r => {
                const d = r.date;
                if (!groups[d]) groups[d] = [];
                groups[d].push(r);
            });
            const groupKeys = Object.keys(groups).sort((a,b) => new Date(b) - new Date(a));

            if (groupKeys.length === 0) {
                recordsContainer.innerHTML = `<div class="empty-state">✨ 本月还没有记录</div>`;
            } else {
                let html = '';
                groupKeys.forEach(date => {
                    const items = groups[date];
                    const dateObj = new Date(date + 'T00:00:00');
                    const dateStr = `${dateObj.getFullYear()}.${String(dateObj.getMonth()+1).padStart(2,'0')}.${String(dateObj.getDate()).padStart(2,'0')}`;
                    html += `<div class="date-group"><div class="date-label">📅 ${dateStr}</div>`;
                    items.forEach(r => {
                        const sign = r.type === 'income' ? '+' : '-';
                        const cls = r.type === 'income' ? 'income' : 'expense';
                        const icon = r.icon || '📌';
                        const note = r.note ? `· ${r.note}` : '';
                        html += `<div class="record-item" data-id="${r.id}">
                            <span class="record-icon">${icon}</span>
                            <div class="record-info"><span class="record-cat">${r.category}</span> <span class="record-note">${note}</span></div>
                            <span class="record-amount ${cls}">${sign}${r.amount.toFixed(2)}</span>
                            <button class="record-del" data-id="${r.id}">✕</button>
                        </div>`;
                    });
                    html += `</div>`;
                });
                recordsContainer.innerHTML = html;

                // 绑定删除事件 (委托)
                document.querySelectorAll('.record-del').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = this.getAttribute('data-id');
                        if (!id) return;
                        if (confirm('删除这条记录吗？')) {
                            let records = loadRecords();
                            records = records.filter(r => r.id !== id);
                            saveRecords(records);
                            renderAll();
                        }
                    });
                });
            }
        }

        // ----- 填充分类下拉 -----
        function populateCategories(type) {
            const cats = type === 'expense' ? EXPENSE_CATS : INCOME_CATS;
            categorySelect.innerHTML = cats.map(c => `<option value="${c.name}" data-icon="${c.icon}">${c.icon} ${c.name}</option>`).join('');
        }

        // 切换类型 (支出/收入)
        function setType(type) {
            currentType = type;
            const btns = typeToggle.querySelectorAll('button');
            btns.forEach(b => {
                const t = b.getAttribute('data-type');
                b.className = '';
                if (t === type) {
                    b.classList.add(type === 'expense' ? 'active-expense' : 'active-income');
                }
            });
            populateCategories(type);
            // 更新分类默认图标
        }

        // 打开模态框 (重置)
        function openModal() {
            setType('expense');
            amountInput.value = '';
            const today = new Date().toISOString().slice(0,10);
            dateInput.value = today;
            noteInput.value = '';
            editingId = null;
            modalOverlay.classList.add('active');
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
        }

        // 保存记录
        function saveRecord() {
            const category = categorySelect.value;
            const amount = parseFloat(amountInput.value);
            const date = dateInput.value;
            const note = noteInput.value.trim();
            if (!category) { alert('请选择分类'); return; }
            if (!amount || amount <= 0) { alert('请输入有效金额'); return; }
            if (!date) { alert('请选择日期'); return; }

            // 获取当前选中的分类图标
            const catList = currentType === 'expense' ? EXPENSE_CATS : INCOME_CATS;
            const found = catList.find(c => c.name === category);
            const icon = found ? found.icon : '📌';

            const record = {
                id: Date.now() + '_' + Math.random().toString(36).slice(2, 6),
                type: currentType,
                category: category,
                amount: amount,
                date: date,
                note: note,
                icon: icon
            };
            const records = loadRecords();
            records.push(record);
            saveRecords(records);
            closeModal();
            renderAll();
        }

        // 清空全部
        function clearAll() {
            if (!confirm('⚠️ 确定要删除所有记账数据吗？')) return;
            saveRecords([]);
            renderAll();
        }

        // ----- 事件绑定 -----
        addBtn.addEventListener('click', openModal);
        cancelModalBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay) closeModal();
        });
        saveModalBtn.addEventListener('click', saveRecord);

        // 类型切换
        typeToggle.addEventListener('click', function(e) {
            const btn = e.target.closest('button');
            if (!btn) return;
            const type = btn.getAttribute('data-type');
            if (type) setType(type);
        });

        clearAllBtn.addEventListener('click', clearAll);

        // 键盘支持
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closeModal();
        });

        // 初始化渲染
        setType('expense');
        renderAll();

        // 额外：设置默认日期
        const todayStr = new Date().toISOString().slice(0,10);
        dateInput.value = todayStr;
    })();
</script>
</body>
</html>
